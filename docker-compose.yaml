services:
  local-proxy:
    build: .
    restart: unless-stopped
    ports:
      - '443:9443'
      - '80:9080'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./certs:/app/certs:ro
      - ./routes.yaml:/app/routes.yaml:ro
    networks:
      - traefik
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      - BASE_DOMAIN=${BASE_DOMAIN:-lvh.me}
      - DOCKER_NETWORK=${DOCKER_NETWORK:-traefik}

networks:
  traefik:
    external: true
