services:
  local-proxy:
    build: .
    restart: unless-stopped
    ports:
      - '443:9443'
      - '80:9080'
      - '6379:6379'
      - '5432:5432'
      - '3306:3306'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./certs:/certs:ro
      - ./routes.yaml:/routes.yaml:ro
    networks:
      - traefik
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      - BASE_DOMAIN=${BASE_DOMAIN:-lvh.me}
      - DOCKER_NETWORK=${DOCKER_NETWORK:-traefik}
      - CERTS_DIR=/certs
      - ROUTES_FILE=/routes.yaml

networks:
  traefik:
    external: true
