services:
  local-proxy:
    build: .
    restart: unless-stopped
    ports:
      - '443:9443'
      - '80:9080'
      - '6379:6379'
      - '5432:5432'
      - '3306:3306'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./certs:/certs:ro
      - ${ROUTES_FILE:-~/.config/local-proxy/routes.yaml}:/routes.yaml:ro
    networks:
      - traefik
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      - BASE_DOMAIN=${BASE_DOMAIN:-lvh.me}
      - DOCKER_NETWORK=${DOCKER_NETWORK:-traefik}
      - CERTS_DIR=/certs
      - ROUTES_FILE=/routes.yaml
      - VITE_DEV_URL=${VITE_DEV_URL:-}

  ui:
    image: oven/bun:latest
    profiles: [dev]
    working_dir: /app
    command: sh -c "bun install && bun run dev"
    restart: unless-stopped
    volumes:
      - ./ui:/app
      - /app/node_modules
    networks:
      - traefik
    environment:
      - BASE_DOMAIN=${BASE_DOMAIN:-lvh.me}

networks:
  traefik:
    external: true
